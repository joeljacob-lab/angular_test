<!doctype html>
<html ng-app="campus360">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    <script src="js/app.js"></script>
    <title>Campus360 Dashboard</title>
  </head>

  <body ng-controller="dashboardController">
    <div>
      <h1>{{collegename}}</h1>
      <label>College Name: </label>
      <input type="text" ng-model="collegename" />
    </div>

    <hr />

    <div>
      <p><strong>Total Students:</strong> {{totalstudents}}</p>
      <label>Edit Student Count: </label>
      <input type="number" ng-model="totalstudents" />
      <button ng-click="totalstudents = totalstudents + 1">
        + Add 1 Student
      </button>
    </div>

    <br />

    <div>
      <p><strong>Total Faculty:</strong> {{totalfaculty}}</p>
      <label>Edit Faculty Count: </label>
      <input type="number" ng-model="totalfaculty" />
      <button ng-click="totalfaculty = totalfaculty + 1">
        + Add 1 Faculty
      </button>
    </div>

    <hr />

    <div>
      <h2>Student List</h2>
      <button ng-click="showstudents = !showstudents">
        {{ showstudents ? 'Hide Students' : 'Show Students' }}
      </button>

      <ul ng-show="showstudents">
        <li ng-repeat="student in students">{{student}}</li>
      </ul>
    </div>
  </body>
</html>
